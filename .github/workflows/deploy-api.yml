name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: brainpal-api
  ECS_CLUSTER: brainpal-prod
  ECS_SERVICE: brainpal-api

permissions:
  id-token: write   # for AWS OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          IMAGE_SHA="$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          IMAGE_LATEST="$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" -f apps/api/Dockerfile .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "IMAGE=$IMAGE_SHA" >> "$GITHUB_ENV"

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
